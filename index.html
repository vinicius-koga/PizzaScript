<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>PizzaScript</title>
</head>
<body>
    <!-- CLONE NODES -->
    <div class="clone-nodes" style="display: none;">

        <div class="menu-item">
            <div class="menu-item-left"> 
                <img src="" alt=""> 
            </div>
            <div class="menu-item-right">
                <h1 class="menu-item-title">--</h1>
                <p class="menu-item-description">--</p>
                <div class="menu-item-price"> R$<span>--</span> </div>
                <button class="menu-item-btn btn">+ CARRINHO</button>
            </div>
        </div>

        <div class="cart-item">
            <div class="left">
                <img src="" alt="">
                <p>-</p>
            </div>

            <div class="btn-row">
                <div class="rbtn decrease">-</div>
                <div class="rbtn amount disabled">-</div>
                <div class="rbtn increase">+</div>
            </div>
        </div>

    </div>

    <!-- PAGE TITLE -->
    <h1 class="title page-title">PizzaScript</h1>

    <!-- MENU -->
    <main id="menu-container"></main>

    <!-- MODAL -->
    <div class="backdrop modal-area" style="display: none;">
        <div class="modal">
            <div class="modal-left">
                <img src="" alt="">
            </div>

            <div class="modal-right">
                <h1>--</h1>
                <p class="mg-bt"></p>
                
                <span>TAMANHO:</span>
                <div class="btn-row mg-bt">
                    <div class="rbtn size-btn">PEQUENA <span class="size">--</span></div>
                    <div class="rbtn size-btn">MÉDIA <span class="size">--</span></div>
                    <div class="rbtn size-btn">GRANDE <span class="size">--</span></div>
                </div>

                <span>PREÇO:</span>
                <div class="modal-row mg-bt">
                    <div class="modal-price">--</div>
                    <div class="btn-row">
                        <div class="rbtn decrease">-</div>
                        <div class="rbtn disabled qt"></div>
                        <div class="rbtn increase">+</div>
                    </div>
                </div>

                <button class="btn modalAdd2CartBtn">ADICIONAR AO CARRINHO</button>
            </div>

            <div class="closeBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                fill="currentColor" viewBox="0 0 24 24" >
                <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                <path d="m7.76 14.83-2.83 2.83 1.41 1.41 2.83-2.83 2.12-2.12.71-.71.71.71 1.41 1.42 3.54 3.53 1.41-1.41-3.53-3.54-1.42-1.41-.71-.71 5.66-5.66-1.41-1.41L12 10.59 6.34 4.93 4.93 6.34 10.59 12l-.71.71z"></path>
                </svg>
            </div>
        </div>
    </div>

    <!-- CART ICON -->
    <div class="cart-icon">
        <svg  xmlns="http://www.w3.org/2000/svg" width="40" height="40"  
        fill="currentColor" viewBox="0 0 24 24" >
        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
        <path d="M21 6H7.05L5.94 2.68A1 1 0 0 0 4.99 2h-3v2h2.28l3.54 10.63A2 2 0 0 0 9.71 16h7.59a2 2 0 0 0 1.87-1.3l2.76-7.35c.11-.31.07-.65-.11-.92A1 1 0 0 0 21 6m-3.69 8H9.72l-2-6h11.84zM10 18a2 2 0 1 0 0 4 2 2 0 1 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 1 0 0-4"></path>
        </svg>
        <div class="cart-icon-tolltip" style="display: none;">-</div>
    </div>

    <!-- CART -->
    <div class="backdrop cart-area" style="display: none;">
        <div class="cart">
            <div class="cart-header">
                <h1 class="title">Carrinho</h1>
                <div class="closeBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                    fill="currentColor" viewBox="0 0 24 24" >
                    <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                    <path d="m7.76 14.83-2.83 2.83 1.41 1.41 2.83-2.83 2.12-2.12.71-.71.71.71 1.41 1.42 3.54 3.53 1.41-1.41-3.53-3.54-1.42-1.41-.71-.71 5.66-5.66-1.41-1.41L12 10.59 6.34 4.93 4.93 6.34 10.59 12l-.71.71z"></path>
                    </svg>
                </div>
            </div>

            <div class="cart-body"></div>

            <div class="cart-checkout">
                <div class="cart-checkout-row subtotal">
                    <p>Subtotal</p>
                    <span>--</span>
                </div>
                <div class="cart-checkout-row discount">
                    <p>Desconto (10%)</p>
                    <span>--</span>
                </div>
                <div class="cart-checkout-row total">
                    <p>Total</p>
                    <span>--</span>
                </div>
            </div>

            <button class="btn order-btn">Finalizar Pedido</button>
        </div>
    </div>

    <script src="./assets/js/main.js" type="module"></script>
</body>
</html>
